name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux GCC
            os: ubuntu-24.04
            compiler: g++
          - name: Linux Clang
            os: ubuntu-24.04
            compiler: clang++
          - name: macOS Apple Silicon
            os: macos-15
            compiler: clang++
          - name: macOS Intel
            os: macos-15-intel
            compiler: clang++
          - name: Windows MSVC
            os: windows-2025
            compiler: cl

    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure
        run: >-
          cmake -S . -B build
          -DCMAKE_CXX_COMPILER=${{ matrix.compiler }}
          -DCPPSEED_BUILD_TESTS=ON
          -DCPPSEED_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build build --config Debug --parallel

      - name: Test
        run: ctest --test-dir build -C Debug --output-on-failure

  docs:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2
      - name: Check whitespace
        run: git diff --check HEAD^ HEAD
      - name: Check GitHub Actions pins
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r line; do
            declaration="${line#*uses: }"
            action="${declaration%% *}"
            [[ "$action" == ./* ]] && continue
            ref="${action##*@}"
            if [[ ! "$ref" =~ ^[0-9a-f]{40}$ ]] || \
                [[ ! "$line" =~ \#\ v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "action must use a full commit SHA and version comment: $line" >&2
              exit 1
            fi
          done < <(grep -RhE '^[[:space:]]*(- )?uses:' .github/workflows)
      - name: Check local Markdown links
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            { grep -oE '\]\([^)#]+' "$file" || true; } | sed 's/^](//' |
              while IFS= read -r target; do
                case "$target" in
                  http://*|https://*|mailto:*) continue ;;
                esac
                test -e "$(dirname "$file")/$target"
              done
          done < <(find . -type f -name '*.md' \
            -not -path './build*/*' -print0)

  coverage:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install gcovr
        run: python3 -m pip install --disable-pip-version-check gcovr==8.6
      - name: Configure coverage build
        env:
          CXXFLAGS: --coverage -O0 -g
        run: >-
          cmake -S . -B build-coverage
          -DCMAKE_BUILD_TYPE=Debug
          -DCPPSEED_BUILD_TESTS=ON
          -DCPPSEED_WARNINGS_AS_ERRORS=ON
      - name: Build
        run: cmake --build build-coverage --parallel
      - name: Test
        run: ctest --test-dir build-coverage --output-on-failure
      - name: Enforce coverage
        run: >-
          gcovr
          --root .
          --filter 'src/'
          --exclude 'src/main.cpp'
          --exclude-unreachable-branches
          --exclude-throw-branches
          --txt
          --json-summary coverage-summary.json
          --fail-under-line 90
          --fail-under-branch 80
      - name: Upload coverage summary
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-summary
          path: coverage-summary.json
          if-no-files-found: ignore
          retention-days: 7

  performance:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Configure Release build
        run: >-
          cmake -S . -B build-performance
          -DCMAKE_BUILD_TYPE=Release
          -DCPPSEED_BUILD_TESTS=OFF
          -DCPPSEED_WARNINGS_AS_ERRORS=ON
      - name: Build
        run: cmake --build build-performance --parallel
      - name: Measure generation performance
        run: >-
          python3 tests/measure_performance.py
          build-performance/cppseed
          --warmups 3
          --runs 30
          --threshold-seconds 1.0
          --output performance.json
      - name: Upload performance result
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: performance-result
          path: performance.json
          if-no-files-found: ignore
          retention-days: 7
