name: Release

on:
  pull_request:
    paths:
      - .github/workflows/release.yml
      - CMakeLists.txt
      - LICENSE
      - README.md
      - SECURITY.md
      - docs/releases/**
      - src/cli.cpp
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: Version without the leading v
        required: true
        default: 0.1.0
        type: string
      ref:
        description: Main commit or branch to package
        required: true
        default: main
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name }}-${{ github.ref }}-${{ inputs.ref || 'none' }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
      source-sha: ${{ steps.version.outputs.source_sha }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Validate version and source
        id: version
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cmake_version=$(sed -nE \
            's/^project\(cppseed VERSION ([0-9]+\.[0-9]+\.[0-9]+) LANGUAGES CXX\)$/\1/p' \
            CMakeLists.txt)
          test -n "$cmake_version"

          if [[ "$EVENT_NAME" == "push" ]]; then
            tag="$GITHUB_REF_NAME"
            [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
            version="${tag#v}"
            git fetch --no-tags origin main
            git merge-base --is-ancestor "$GITHUB_SHA" origin/main
            test "$(gh api "repos/$GITHUB_REPOSITORY" --jq .private)" = "false"
          elif [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            version="$INPUT_VERSION"
            [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          else
            version="$cmake_version"
          fi

          test "$version" = "$cmake_version"
          test -f "docs/releases/v${version}.md"
          source_sha=$(git rev-parse HEAD)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "source_sha=$source_sha" >> "$GITHUB_OUTPUT"
          echo "Packaging cppseed $version from $source_sha"

  package:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: macos-arm64
            os: macos-15
            target: aarch64-apple-darwin
            format: tar.gz
            cmake-args: -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0
          - id: macos-x64
            os: macos-15-intel
            target: x86_64-apple-darwin
            format: tar.gz
            cmake-args: -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0
          - id: linux-x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            format: tar.gz
            cmake-args: ''
          - id: windows-x64
            os: windows-2025
            target: x86_64-pc-windows-msvc
            format: zip
            cmake-args: -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded

    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    env:
      VERSION: ${{ needs.validate.outputs.version }}

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Configure Release build
        shell: bash
        run: >-
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCPPSEED_BUILD_TESTS=ON
          -DCPPSEED_WARNINGS_AS_ERRORS=ON
          ${{ matrix['cmake-args'] }}

      - name: Build
        shell: bash
        run: cmake --build build --config Release --parallel

      - name: Test
        shell: bash
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Package and inspect Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          test "$(build/cppseed --version)" = "cppseed $VERSION"
          rm -rf staging
          mkdir staging
          cp build/cppseed LICENSE README.md staging/
          chmod 755 staging/cppseed

          if [[ "${{ matrix.id }}" == "linux-x64" ]]; then
            report="dependency-report-${{ matrix.id }}.txt"
            ldd staging/cppseed | tee "$report"
            ! grep -q 'not found' "$report"
          else
            report="dependency-report-${{ matrix.id }}.txt"
            otool -L staging/cppseed | tee "$report"
            if grep -E '^[[:space:]]+/' "$report" | \
                grep -Ev '^[[:space:]]+(/usr/lib|/System/Library)' >/dev/null; then
              echo "unexpected non-system macOS dependency" >&2
              exit 1
            fi
          fi

          archive="cppseed-v${VERSION}-${{ matrix.target }}.tar.gz"
          tar -czf "$archive" -C staging cppseed LICENSE README.md
          echo "ARCHIVE=$archive" >> "$GITHUB_ENV"

      - name: Smoke test Unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf unpacked smoke
          mkdir unpacked smoke
          tar -xzf "$ARCHIVE" -C unpacked
          entries=$(find unpacked -mindepth 1 -maxdepth 1 \
            -exec basename {} \; | LC_ALL=C sort | paste -sd ' ' -)
          test "$entries" = "LICENSE README.md cppseed"
          test -x unpacked/cppseed
          test "$(unpacked/cppseed --version)" = "cppseed $VERSION"
          unpacked/cppseed --help >/dev/null

          absolute_binary="$PWD/unpacked/cppseed"
          (
            cd smoke
            "$absolute_binary" new release-smoke --std 20
          )
          cmake -S smoke/release-smoke -B smoke/release-smoke/build \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build smoke/release-smoke/build --config Release --parallel
          test "$(smoke/release-smoke/build/release-smoke)" = \
            "Hello from release-smoke!"
          ctest --test-dir smoke/release-smoke/build -C Release \
            --output-on-failure

      - name: Package and inspect Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $binary = 'build\Release\cppseed.exe'
          $versionOutput = (& $binary --version | Out-String).Trim()
          if ($LASTEXITCODE -ne 0 -or $versionOutput -ne "cppseed $env:VERSION") {
            throw "version mismatch: $versionOutput"
          }

          Remove-Item staging -Recurse -Force -ErrorAction SilentlyContinue
          New-Item staging -ItemType Directory | Out-Null
          Copy-Item $binary staging\cppseed.exe
          Copy-Item -LiteralPath LICENSE, README.md -Destination staging

          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installation = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          $dumpbin = Get-ChildItem "$installation\VC\Tools\MSVC\*\bin\Hostx64\x64\dumpbin.exe" |
            Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $dumpbin) { throw 'dumpbin.exe was not found' }
          $report = 'dependency-report-${{ matrix.id }}.txt'
          & $($dumpbin.FullName) /dependents staging\cppseed.exe |
            Tee-Object $report
          if ($LASTEXITCODE -ne 0) { throw 'dumpbin failed' }
          if (Select-String -Path $report -Pattern 'VCRUNTIME|MSVCP') {
            throw 'MSVC runtime is dynamically linked'
          }

          $archive = "cppseed-v$env:VERSION-${{ matrix.target }}.zip"
          $archiveFiles = @('staging\cppseed.exe', 'staging\LICENSE', 'staging\README.md')
          Compress-Archive -LiteralPath $archiveFiles -DestinationPath $archive
          "ARCHIVE=$archive" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Smoke test Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Remove-Item unpacked, smoke -Recurse -Force -ErrorAction SilentlyContinue
          Expand-Archive $env:ARCHIVE unpacked
          $actual = @(Get-ChildItem unpacked -File | Sort-Object Name |
            ForEach-Object Name)
          $expected = @('cppseed.exe', 'LICENSE', 'README.md') | Sort-Object
          if (Compare-Object $actual $expected) { throw 'unexpected archive contents' }

          $binary = (Resolve-Path unpacked\cppseed.exe).Path
          $versionOutput = (& $binary --version | Out-String).Trim()
          if ($LASTEXITCODE -ne 0 -or $versionOutput -ne "cppseed $env:VERSION") {
            throw "version mismatch: $versionOutput"
          }
          & $binary --help | Out-Null
          if ($LASTEXITCODE -ne 0) { throw 'help failed' }

          New-Item smoke -ItemType Directory | Out-Null
          Push-Location smoke
          & $binary new release-smoke --std 20
          if ($LASTEXITCODE -ne 0) { throw 'generation failed' }
          Pop-Location
          cmake -S smoke\release-smoke -B smoke\release-smoke\build
          if ($LASTEXITCODE -ne 0) { throw 'generated CMake configure failed' }
          cmake --build smoke\release-smoke\build --config Release --parallel
          if ($LASTEXITCODE -ne 0) { throw 'generated build failed' }
          $generated = (& smoke\release-smoke\build\Release\release-smoke.exe |
            Out-String).Trim()
          if ($LASTEXITCODE -ne 0 -or $generated -ne 'Hello from release-smoke!') {
            throw "generated executable failed: $generated"
          }
          ctest --test-dir smoke\release-smoke\build -C Release --output-on-failure
          if ($LASTEXITCODE -ne 0) { throw 'generated CTest failed' }

      - name: Upload platform archive
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-${{ matrix.id }}
          path: |
            ${{ env.ARCHIVE }}
            dependency-report-${{ matrix.id }}.txt
          if-no-files-found: error
          retention-days: 7

  aggregate:
    needs: [validate, package]
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Create and verify checksums
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t archives < <(find dist -maxdepth 1 -type f \
            -name 'cppseed-v*' | LC_ALL=C sort)
          test "${#archives[@]}" -eq 4
          (
            cd dist
            for archive in cppseed-v*; do
              sha256sum "$archive"
            done | LC_ALL=C sort -k2 > SHA256SUMS
            test "$(wc -l < SHA256SUMS)" -eq 4
            sha256sum --check SHA256SUMS
          )

      - name: Upload complete release assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-assets
          path: |
            dist/cppseed-v*
            dist/SHA256SUMS
          if-no-files-found: error
          retention-days: 7

  create-draft-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: [validate, aggregate]
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: release-assets
          path: dist
      - name: Create draft GitHub Release
        shell: bash
        run: |
          set -euo pipefail
          tag="v$VERSION"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "release $tag already exists" >&2
            exit 1
          fi
          gh release create "$tag" \
            dist/cppseed-v* \
            dist/SHA256SUMS \
            --draft \
            --verify-tag \
            --title "cppseed $tag" \
            --notes-file "docs/releases/$tag.md"
