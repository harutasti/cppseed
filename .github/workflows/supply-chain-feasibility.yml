name: Supply-chain G2 feasibility

on:
  pull_request:
    paths:
      - .github/requirements/spdx-tools-0.8.5-linux-py310.txt
      - .github/scripts/run-supply-chain-feasibility.sh
      - .github/workflows/supply-chain-feasibility.yml
      - CMakeLists.txt
      - LICENSE
      - README.md
      - docs/initiatives/supply-chain/**
      - include/**
      - src/**
      - tests/**
  push:
    tags:
      - 'spike/supply-chain-g2-*'

permissions:
  contents: read

concurrency:
  group: supply-chain-g2-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  safe-validation:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Build archive and validate SPDX evidence
        id: evidence
        run: bash .github/scripts/run-supply-chain-feasibility.sh
      - name: Upload unprivileged feasibility evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: supply-chain-g2-pr-${{ github.event.pull_request.number }}
          path: supply-chain-evidence
          if-no-files-found: error
          retention-days: 30

  trusted-attestation:
    if: >-
      github.event_name == 'push'
      && startsWith(github.ref, 'refs/tags/spike/supply-chain-g2-')
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    env:
      GH_TOKEN: ${{ github.token }}
      SIGNER_WORKFLOW: ${{ github.repository }}/.github/workflows/supply-chain-feasibility.yml
      SPDX_PREDICATE: https://spdx.dev/Document/v2.3
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Validate trusted source
        shell: bash
        run: |
          set -euo pipefail
          [[ "$GITHUB_REF_NAME" =~ ^spike/supply-chain-g2-[0-9]{8}(-[0-9]+)?$ ]]
          test "$(git cat-file -t "refs/tags/$GITHUB_REF_NAME")" = "tag"
          git fetch --no-tags origin main:refs/remotes/origin/main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
          test "$(gh api "repos/$GITHUB_REPOSITORY" --jq .private)" = "false"
      - name: Build archive and validate SPDX evidence
        id: evidence
        run: bash .github/scripts/run-supply-chain-feasibility.sh
      - name: Generate build provenance
        id: provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: ${{ steps.evidence.outputs.archive }}
      - name: Generate SBOM attestation
        id: sbom-attestation
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: ${{ steps.evidence.outputs.archive }}
          sbom-path: ${{ steps.evidence.outputs.sbom }}
      - name: Preserve generated bundles and trusted root
        shell: bash
        env:
          EVIDENCE_DIR: ${{ steps.evidence.outputs.evidence-dir }}
          ARCHIVE_NAME: ${{ steps.evidence.outputs.archive-name }}
          PROVENANCE_BUNDLE: ${{ steps.provenance.outputs.bundle-path }}
          SBOM_BUNDLE: ${{ steps.sbom-attestation.outputs.bundle-path }}
        run: |
          set -euo pipefail
          cp "$PROVENANCE_BUNDLE" \
            "$EVIDENCE_DIR/$ARCHIVE_NAME.provenance.bundle.json"
          cp "$SBOM_BUNDLE" \
            "$EVIDENCE_DIR/$ARCHIVE_NAME.sbom.bundle.json"
          gh attestation trusted-root >"$EVIDENCE_DIR/trusted_root.jsonl"
          gh --version >>"$EVIDENCE_DIR/tool-versions.txt"
      - name: Verify attestations online
        shell: bash
        env:
          ARCHIVE: ${{ steps.evidence.outputs.archive }}
          ARCHIVE_SHA256: ${{ steps.evidence.outputs.archive-sha256 }}
          EVIDENCE_DIR: ${{ steps.evidence.outputs.evidence-dir }}
        run: |
          set -euo pipefail
          gh attestation verify "$ARCHIVE" \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "$SIGNER_WORKFLOW" \
            --source-ref "$GITHUB_REF" \
            --source-digest "$GITHUB_SHA" \
            --deny-self-hosted-runners \
            --predicate-type https://slsa.dev/provenance/v1 \
            --format json \
            >"$EVIDENCE_DIR/online-provenance-verification.json"
          gh attestation verify "$ARCHIVE" \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "$SIGNER_WORKFLOW" \
            --source-ref "$GITHUB_REF" \
            --source-digest "$GITHUB_SHA" \
            --deny-self-hosted-runners \
            --predicate-type "$SPDX_PREDICATE" \
            --format json \
            >"$EVIDENCE_DIR/online-sbom-verification.json"
          jq -e --arg digest "$ARCHIVE_SHA256" '
            length > 0 and all(.[].verificationResult.statement.subject[];
              .digest.sha256 == $digest)
          ' "$EVIDENCE_DIR/online-provenance-verification.json" >/dev/null
          jq -e --arg digest "$ARCHIVE_SHA256" '
            length > 0 and all(.[].verificationResult.statement.subject[];
              .digest.sha256 == $digest)
          ' "$EVIDENCE_DIR/online-sbom-verification.json" >/dev/null
      - name: Verify bundles without network access
        shell: bash
        env:
          ARCHIVE: ${{ steps.evidence.outputs.archive }}
          ARCHIVE_NAME: ${{ steps.evidence.outputs.archive-name }}
          EVIDENCE_DIR: ${{ steps.evidence.outputs.evidence-dir }}
        run: |
          set -euo pipefail
          common_args=(
            --repo "$GITHUB_REPOSITORY"
            --signer-workflow "$SIGNER_WORKFLOW"
            --source-ref "$GITHUB_REF"
            --source-digest "$GITHUB_SHA"
            --deny-self-hosted-runners
            --custom-trusted-root "$EVIDENCE_DIR/trusted_root.jsonl"
            --format json
          )
          env -u GH_TOKEN -u GITHUB_TOKEN \
            HTTP_PROXY=http://127.0.0.1:9 \
            HTTPS_PROXY=http://127.0.0.1:9 \
            ALL_PROXY=http://127.0.0.1:9 \
            NO_PROXY= \
            gh attestation verify "$ARCHIVE" \
              "${common_args[@]}" \
              --predicate-type https://slsa.dev/provenance/v1 \
              --bundle "$EVIDENCE_DIR/$ARCHIVE_NAME.provenance.bundle.json" \
              >"$EVIDENCE_DIR/offline-provenance-verification.json"
          env -u GH_TOKEN -u GITHUB_TOKEN \
            HTTP_PROXY=http://127.0.0.1:9 \
            HTTPS_PROXY=http://127.0.0.1:9 \
            ALL_PROXY=http://127.0.0.1:9 \
            NO_PROXY= \
            gh attestation verify "$ARCHIVE" \
              "${common_args[@]}" \
              --predicate-type "$SPDX_PREDICATE" \
              --bundle "$EVIDENCE_DIR/$ARCHIVE_NAME.sbom.bundle.json" \
              >"$EVIDENCE_DIR/offline-sbom-verification.json"
      - name: Confirm attested SBOM equals the released SBOM file
        shell: bash
        env:
          SBOM: ${{ steps.evidence.outputs.sbom }}
          EVIDENCE_DIR: ${{ steps.evidence.outputs.evidence-dir }}
        run: |
          set -euo pipefail
          jq -S . "$SBOM" >"$RUNNER_TEMP/expected-sbom.json"
          jq -S '.[0].verificationResult.statement.predicate' \
            "$EVIDENCE_DIR/offline-sbom-verification.json" \
            >"$EVIDENCE_DIR/attested-sbom.json"
          cmp "$RUNNER_TEMP/expected-sbom.json" \
            "$EVIDENCE_DIR/attested-sbom.json"
          (
            cd "$EVIDENCE_DIR"
            find . -maxdepth 1 -type f ! -name EVIDENCE_SHA256SUMS \
              -print0 | LC_ALL=C sort -z | xargs -0 sha256sum \
              >EVIDENCE_SHA256SUMS
          )
      - name: Upload trusted feasibility evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: supply-chain-g2-tag-${{ github.run_id }}
          path: supply-chain-evidence
          if-no-files-found: error
          retention-days: 30
