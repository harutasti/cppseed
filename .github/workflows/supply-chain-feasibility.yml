name: Supply-chain G2 feasibility

on:
  pull_request:
    paths:
      - .github/requirements/spdx-tools-0.8.5-linux-py310.txt
      - .github/scripts/run-supply-chain-feasibility.sh
      - .github/workflows/supply-chain-feasibility.yml
      - CMakeLists.txt
      - LICENSE
      - README.md
      - docs/initiatives/supply-chain/**
      - include/**
      - src/**
      - tests/**

permissions:
  contents: read

concurrency:
  group: supply-chain-g2-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  safe-validation:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Build archive and validate SPDX evidence
        id: evidence
        run: bash .github/scripts/run-supply-chain-feasibility.sh
      - name: Upload unprivileged feasibility evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: supply-chain-g2-pr-${{ github.event.pull_request.number }}
          path: supply-chain-evidence
          if-no-files-found: error
          retention-days: 30
